<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPM Sync — Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      color: #000;
    }
    .logo { font-size: 36px; font-weight: 700; letter-spacing: -1px; }
    .msg  { font-size: 14px; color: #666; }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid #e0e0e0;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">BPM</div>
  <div class="spinner"></div>
  <div class="msg" id="msg">Connexion en cours…</div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const code    = params.get('code');
    const token   = params.get('token');
    const service = params.get('service');
    const error   = params.get('error');

    if (error) {
      document.getElementById('msg').textContent = 'Connexion annulée.';
      setTimeout(() => window.location.href = 'index.html', 1500);

    } else if (service === 'lastfm' && token) {
      // Callback Last.fm
      document.getElementById('msg').textContent = 'Connexion Last.fm en cours…';
      const API_KEY = '83b3288bc8fa87c39dd8d40fcba8bc64';

      // Pour Last.fm on a juste besoin du token + username via getSession
      // On utilise SHA-256 comme signature (approximation)
      const sigStr = `api_key${API_KEY}methodauth.getSessiontoken${token}${API_KEY}`;
      crypto.subtle.digest('SHA-256', new TextEncoder().encode(sigStr))
        .then(buf => Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(''))
        .then(sig => fetch(`https://ws.audioscrobbler.com/2.0/?method=auth.getSession&api_key=${API_KEY}&token=${token}&api_sig=${sig}&format=json`))
        .then(r => r.json())
        .then(data => {
          if (data.session) {
            localStorage.setItem('lastfm_session',  data.session.key);
            localStorage.setItem('lastfm_username', data.session.name);
            document.getElementById('msg').textContent = 'Last.fm connecté ✓';
            setTimeout(() => window.location.href = 'index.html', 800);
          } else {
            document.getElementById('msg').textContent = 'Erreur Last.fm : ' + (data.message || 'inconnu');
            setTimeout(() => window.location.href = 'index.html', 2000);
          }
        })
        .catch(() => {
          document.getElementById('msg').textContent = 'Erreur réseau Last.fm.';
          setTimeout(() => window.location.href = 'index.html', 2000);
        });

    } else if (code) {
      // Callback Spotify
      document.getElementById('msg').textContent = 'Connexion Spotify en cours…';
      const CLIENT_ID    = 'bef3899241db4e618883042e808327a2';
      const REDIRECT_URI = window.location.hostname === '127.0.0.1'
        ? 'http://127.0.0.1:5500/callback.html'
        : 'https://anasbeeee.github.io/app_bpm/callback.html';
      const verifier = sessionStorage.getItem('pkce_verifier');

      fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          code,
          redirect_uri:  REDIRECT_URI,
          client_id:     CLIENT_ID,
          code_verifier: verifier,
        }),
      })
      .then(r => r.json())
      .then(data => {
        if (data.access_token) {
          localStorage.setItem('spotify_token',         data.access_token);
          localStorage.setItem('spotify_refresh_token', data.refresh_token || '');
          localStorage.setItem('spotify_token_expiry',  Date.now() + data.expires_in * 1000);
          document.getElementById('msg').textContent = 'Spotify connecté ✓';
          window.location.href = 'index.html';
        } else {
          document.getElementById('msg').textContent = 'Erreur : ' + (data.error_description || 'token invalide');
          setTimeout(() => window.location.href = 'index.html', 2000);
        }
      })
      .catch(() => {
        document.getElementById('msg').textContent = 'Erreur réseau. Réessaie.';
        setTimeout(() => window.location.href = 'index.html', 2000);
      });

    } else {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
